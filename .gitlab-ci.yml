variables: #Use this to pull submodules, currently gitlab is broken for submodules on CI
  GIT_SUBMODULE_STRATEGY: normal

# The following workflow causes this to only
# run on specific branches. These branches are for different environments.
# Another useful variable is $CI_MERGE_REQUEST_TARGET_BRANCH_NAME
workflow:
  rules:
    # - if: $CI_COMMIT_BRANCH == "staging"
    #   when: never
    # - if: $CI_COMMIT_BRANCH == "development"
    #   when: always
    # - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME  == "staging"
    #   when: always
    # - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME  == "development"
    #   when: always
    # - if: $CI_COMMIT_BRANCH == "main"
    #   when: always
    # - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME  == "main"
    #   when: always
    - when: never

stages:
  - test

test:
  stage: test
  script:
    - sh countAllLines.sh
    - sh countImportant.sh
  rules:
    - when: never
  tags: [DEV,HYPE]


